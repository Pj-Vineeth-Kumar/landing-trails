<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GlobalCodio — The AI platform for global immigration</title>
<meta name="description" content="AI-powered immigration platform. Agents for document intake, form preparation, compliance, and evidentiary drafting."/>
<link rel="stylesheet" href="harvey.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="grain"></div>
<div id="root"></div>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "headline": "domain",
    "theme": "paper",
    "font": "tiempos"
  }/*EDITMODE-END*/;
  window.__TWEAKS__ = {...TWEAK_DEFAULTS};
</script>

<script type="text/babel" src="hcomponents/HNav.jsx"></script>
<script type="text/babel" src="hcomponents/HHero.jsx"></script>
<script type="text/babel" src="hcomponents/HSections.jsx"></script>
<script type="text/babel" src="hcomponents/HTweaks.jsx"></script>

<script type="text/babel">
const App = () => {
  const [tweaks, setTweaks] = React.useState(window.__TWEAKS__);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
    }, { threshold: 0.12, rootMargin:'0px 0px -6% 0px' });
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  }, [tweaks]);

  React.useEffect(() => {
    // Theme tweak
    const themes = {
      cream: {cream:'#f2ede3', cream2:'#ebe5d6', cream3:'#e3dcc9', ink:'#141414', line:'#d8d1bd', line2:'#c9c1ab'},
      paper: {cream:'#faf8f2', cream2:'#f2efe4', cream3:'#e9e5d4', ink:'#0a0a0a', line:'#e5e0cf', line2:'#d4cdb8'},
      dusk:  {cream:'#e8e1ce', cream2:'#dcd4be', cream3:'#ccc4ac', ink:'#1a1912', line:'#c4bca3', line2:'#b0a88e'},
    };
    const t = themes[tweaks.theme||'cream'];
    const r = document.documentElement;
    r.style.setProperty('--cream', t.cream);
    r.style.setProperty('--cream-2', t.cream2);
    r.style.setProperty('--cream-3', t.cream3);
    r.style.setProperty('--ink', t.ink);
    r.style.setProperty('--line', t.line);
    r.style.setProperty('--line-2', t.line2);

    const fonts = {
      fraunces: "'Fraunces', 'Times New Roman', serif",
      tiempos: "'Instrument Serif', 'Times New Roman', serif",
      editorial: "'Fraunces', Georgia, serif",
    };
    r.style.setProperty('--display', fonts[tweaks.font||'fraunces']);
  }, [tweaks.theme, tweaks.font]);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const updateTweak = (k, v) => {
    const next = {...tweaks, [k]: v};
    setTweaks(next);
    window.__TWEAKS__ = next;
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*');
  };

  return (
    <>
      <HNav/>
      <main>
        <HHero tweaks={tweaks}/>
        <HLogoWall/>
        <HCapabilities tweaks={tweaks}/>
        <HQuote/>
        <HAgents/>
        <HUseCases/>
        <HTrust/>
        <HCTA/>
      </main>
      <HFooter/>
      {editMode && <HTweaks tweaks={tweaks} onChange={updateTweak}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
