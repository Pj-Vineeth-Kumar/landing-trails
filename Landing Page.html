<!doctype html>
<!-- This file used the in-browser Babel workflow. GSAP + Framer Motion need Vite: run `npm install` then `npm run dev`, or open `dist/index.html` after `npm run build`. Source entry: `index.html`. -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GlobalCodio — AI-powered global immigration</title>
<meta name="description" content="A workforce of AI agents for document intake, form preparation, compliance verification, and evidentiary drafting."/>
<link rel="stylesheet" href="site.css?v=7"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "headline": "edge",
    "accent": "blue"
  }/*EDITMODE-END*/;
  window.__TWEAKS__ = {...TWEAK_DEFAULTS};
</script>

<script type="text/babel" src="site/Nav.jsx"></script>
<script type="text/babel" src="site/Hero.jsx"></script>
<script type="text/babel" src="site/Sections1.jsx"></script>
<script type="text/babel" src="site/Sections2.jsx"></script>

<script type="text/babel">
const App = () => {
  const [tweaks,setTweaks] = React.useState(window.__TWEAKS__);
  const [editMode,setEditMode] = React.useState(false);

  React.useEffect(()=>{
    // Opt-in scroll animation: add .reveal-anim to elements below the fold, then fade in on intersection
    const vh = window.innerHeight;
    const belowFold = [];
    document.querySelectorAll('.reveal').forEach(el=>{
      const r = el.getBoundingClientRect();
      if (r.top >= vh * 0.95) {
        el.classList.add('reveal-anim');
        belowFold.push(el);
      }
    });
    const io = new IntersectionObserver(es=>es.forEach(e=>{
      if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }
    }),{threshold:.05,rootMargin:'0px 0px -5% 0px'});
    belowFold.forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  },[tweaks]);

  React.useEffect(()=>{
    const r = document.documentElement;
    const accents = {
      blue: {a:'#1950C6',h:'#4a7ee0',i:'#0e266c',s:'#e8eefc'},
      deep: {a:'#0e266c',h:'#1950C6',i:'#071640',s:'#dce3f2'},
      ink:  {a:'#0a0b0d',h:'#282b31',i:'#000',s:'#eef0f3'},
    }[tweaks.accent||'blue'];
    r.style.setProperty('--blue',accents.a);
    r.style.setProperty('--blue-hover',accents.h);
    r.style.setProperty('--blue-ink',accents.i);
    r.style.setProperty('--blue-soft',accents.s);
  },[tweaks.accent]);

  React.useEffect(()=>{
    const onMsg = (e)=>{
      if(!e.data||!e.data.type) return;
      if(e.data.type==='__activate_edit_mode') setEditMode(true);
      if(e.data.type==='__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message',onMsg);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',onMsg);
  },[]);

  const updateTweak = (k,v)=>{
    const next = {...tweaks,[k]:v};
    setTweaks(next);
    window.__TWEAKS__ = next;
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');
  };

  return (
    <>
      <Nav/>
      <main>
        <Hero tweaks={tweaks}/>
        <LogoStrip/>
        <ValueProp/>
        <HowItWorks/>
        <AgentOrbit/>
        <Testimonial/>
        <CaseStudies/>
        <Metrics/>
        <CTA/>
      </main>
      <Footer/>
      {editMode && <Tweaks tweaks={tweaks} onChange={updateTweak}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
