<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GlobalCodio — Immigration Performance</title>
<meta name="description" content="AI platform for global immigration. Agents for intake, extraction, compliance, preparation, and drafting."/>
<link rel="stylesheet" href="perform.css?v=3"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="noise"></div>
<div id="root"></div>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "headline": "perform",
    "accent": "blue",
    "bg": "white"
  }/*EDITMODE-END*/;
  window.__TWEAKS__ = {...TWEAK_DEFAULTS};
</script>

<script type="text/babel" src="pcomponents/PHero.jsx"></script>
<script type="text/babel" src="pcomponents/PSections.jsx"></script>

<script type="text/babel">
const App = () => {
  const [tweaks,setTweaks] = React.useState(window.__TWEAKS__);
  const [editMode,setEditMode] = React.useState(false);

  React.useEffect(()=>{
    const io = new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.1,rootMargin:'0px 0px -5% 0px'});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  },[tweaks]);

  React.useEffect(()=>{
    const r = document.documentElement;
    const accents = {
      blue:  {a:'#1950C6',b:'#2f67d9',ink:'#0e266c',g:'rgba(25,80,198,.22)'},
      ink:   {a:'#0b1324',b:'#1a2440',ink:'#000',g:'rgba(11,19,36,.22)'},
      spark: {a:'#ff5b2e',b:'#ff7a55',ink:'#a8371a',g:'rgba(255,91,46,.28)'},
    }[tweaks.accent||'blue'];
    r.style.setProperty('--accent',accents.a);
    r.style.setProperty('--accent-2',accents.b);
    r.style.setProperty('--accent-ink',accents.ink);
    r.style.setProperty('--accent-glow',accents.g);

    const bgs = {
      white: {bg:'#ffffff',bg2:'#fafbfc',bg3:'#f4f6f9'},
      paper: {bg:'#faf9f4',bg2:'#f6f5ef',bg3:'#efede4'},
      cool:  {bg:'#f7f9fc',bg2:'#eef2f7',bg3:'#e6ecf3'},
    }[tweaks.bg||'white'];
    r.style.setProperty('--bg',bgs.bg);
    r.style.setProperty('--bg-2',bgs.bg2);
    r.style.setProperty('--bg-3',bgs.bg3);
  },[tweaks.accent,tweaks.bg]);

  React.useEffect(()=>{
    const onMsg = (e)=>{
      if(!e.data||!e.data.type) return;
      if(e.data.type==='__activate_edit_mode') setEditMode(true);
      if(e.data.type==='__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message',onMsg);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',onMsg);
  },[]);

  const updateTweak = (k,v)=>{
    const next = {...tweaks,[k]:v};
    setTweaks(next);
    window.__TWEAKS__ = next;
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');
  };

  return (
    <>
      <PNav/>
      <main>
        <PHero tweaks={tweaks}/>
        <PLogoStrip/>
        <PCapabilities/>
        <PAgents/>
        <PUseCases/>
        <PMetrics/>
        <PCTA/>
      </main>
      <PFooter/>
      {editMode && <PTweaks tweaks={tweaks} onChange={updateTweak}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
