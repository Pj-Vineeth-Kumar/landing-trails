<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GlobalCodio — The quiet partner behind every filing</title>
<meta name="description" content="AI-powered global immigration platform. Agents that read documents, fill forms, verify compliance, and draft letters — for attorneys, HR, employees, and providers across 7 jurisdictions."/>
<link rel="stylesheet" href="styles.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="grain"></div>
<div id="root"></div>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "headline": "partner",
    "bg": "aurora",
    "cardStyle": "elevated",
    "motion": "calm"
  }/*EDITMODE-END*/;
  window.__TWEAKS__ = {...TWEAK_DEFAULTS};
</script>

<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Agents.jsx"></script>
<script type="text/babel" src="components/Workflow.jsx"></script>
<script type="text/babel" src="components/Personas.jsx"></script>
<script type="text/babel" src="components/Sections.jsx"></script>
<script type="text/babel" src="components/Tweaks.jsx"></script>

<script type="text/babel">
const App = () => {
  const [tweaks, setTweaks] = React.useState(window.__TWEAKS__);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
    }, { threshold: 0.12, rootMargin:'0px 0px -6% 0px' });
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  }, [tweaks]);

  React.useEffect(() => {
    // apply motion class to body
    document.body.dataset.motion = tweaks.motion || 'calm';
    document.body.dataset.cardStyle = tweaks.cardStyle || 'elevated';
  }, [tweaks.motion, tweaks.cardStyle]);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const updateTweak = (k, v) => {
    const next = {...tweaks, [k]: v};
    setTweaks(next);
    window.__TWEAKS__ = next;
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*');
  };

  return (
    <>
      <Nav/>
      <main>
        <Hero tweaks={tweaks}/>
        <Agents tweaks={tweaks}/>
        <Workflow tweaks={tweaks}/>
        <UseCases tweaks={tweaks}/>
        <Personas tweaks={tweaks}/>
        <PolicyCallout tweaks={tweaks}/>
        <Trust tweaks={tweaks}/>
        <CTA tweaks={tweaks}/>
      </main>
      {editMode && <Tweaks tweaks={tweaks} onChange={updateTweak}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
